<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Abridge Mobile Attendance Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F48C51", 
                        secondary: "#FCD34D", 
                        quiet: "#334155", 
                        "background-light": "#F9FAFB", 
                        "background-dark": "#111827", 
                        "card-light": "#FFFFFF",
                        "card-dark": "#1F2937",
                        "text-primary-light": "#1F2937",
                        "text-primary-dark": "#F9FAFB",
                        "text-secondary-light": "#6B7280",
                        "text-secondary-dark": "#9CA3AF",
                        accent: "#8B5CF6", // Purple for variety
                    },
                    fontFamily: {
                        display: ["Poppins", "sans-serif"],
                        body: ["Poppins", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'squircle': "1.2rem", 
                        '2xl': "1.5rem",
                        '3xl': "2rem",
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(244, 140, 81, 0.3)',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #4b5563; 
        }
        .rounded-squircle {
            border-radius: 20px; 
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }.mobile-frame {
            max-width: 390px;
            margin: 0 auto;
            border: 1px solid #e5e7eb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #F9FAFB;
            overflow: hidden;
            position: relative;
        }
        .dark .mobile-frame {
            background-color: #111827;
            border-color: #374151;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center font-body transition-colors duration-300">
<div class="mobile-frame w-full h-full shadow-2xl relative">
<header class="pt-12 pb-4 px-6 bg-card-light dark:bg-card-dark flex justify-between items-center sticky top-0 z-20 shadow-sm">
<div>
<h1 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Attendance</h1>
<p class="text-xs text-gray-500 dark:text-gray-400 font-medium">Manage student absences</p>
</div>
<div class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center relative cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
<span class="material-icons text-gray-600 dark:text-gray-300">history</span>
</div>
</header>
<main class="flex-1 overflow-y-auto px-6 pb-24 pt-6 bg-background-light dark:bg-background-dark no-scrollbar">
<button class="w-full bg-primary hover:bg-orange-600 active:scale-95 transition-all duration-200 text-white rounded-3xl p-6 shadow-lg shadow-orange-200 dark:shadow-none mb-8 relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full -mr-10 -mt-10 transform group-hover:scale-110 transition-transform"></div>
<div class="flex flex-col items-center justify-center gap-3 relative z-10">
<div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm">
<span class="material-icons text-3xl">add_circle</span>
</div>
<span class="text-xl font-bold tracking-wide">Report Absence</span>
<span class="text-xs text-white/80 font-medium bg-white/10 px-3 py-1 rounded-full">Notify the school</span>
</div>
</button>
<div class="bg-white dark:bg-card-dark rounded-squircle p-1.5 shadow-sm border border-gray-100 dark:border-gray-800 mb-8 flex relative">
<div class="w-1/2 h-full absolute left-0 top-0 p-1.5 transition-all duration-300 ease-in-out transform translate-x-0">
<div class="w-full h-full bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl border border-indigo-100 dark:border-indigo-800/50 shadow-sm"></div>
</div>
<button class="flex-1 py-4 flex flex-col items-center justify-center gap-1 relative z-10 rounded-2xl transition-colors">
<span class="material-icons text-indigo-500 text-2xl">sick</span>
<span class="text-sm font-bold text-indigo-900 dark:text-indigo-200">Sick</span>
</button>
<button class="flex-1 py-4 flex flex-col items-center justify-center gap-1 relative z-10 rounded-2xl group">
<span class="material-icons text-gray-400 group-hover:text-gray-600 dark:group-hover:text-gray-300 text-2xl transition-colors">calendar_month</span>
<span class="text-sm font-medium text-gray-500 dark:text-gray-400 group-hover:text-gray-700 dark:group-hover:text-gray-200 transition-colors">Appointment</span>
</button>
</div>
<div class="flex justify-between items-end mb-4 px-1">
<h2 class="text-lg font-bold text-gray-800 dark:text-white">Recent Records</h2>
<button class="text-xs font-semibold text-primary hover:text-orange-600 transition-colors">View All</button>
</div>
<div class="space-y-4">
<div class="bg-white dark:bg-card-dark p-4 rounded-squircle shadow-soft border border-gray-100 dark:border-gray-800 flex items-center gap-4 group cursor-pointer hover:shadow-md transition-all">
<div class="w-12 h-12 rounded-2xl bg-red-50 dark:bg-red-900/20 text-red-500 flex items-center justify-center shrink-0">
<span class="material-icons">thermostat</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-center mb-1">
<h3 class="font-semibold text-gray-900 dark:text-gray-100 truncate">Leo - Sick Day</h3>
<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300">Excused</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400">Oct 24 • High Fever</p>
</div>
</div>
<div class="bg-white dark:bg-card-dark p-4 rounded-squircle shadow-soft border border-gray-100 dark:border-gray-800 flex items-center gap-4 group cursor-pointer hover:shadow-md transition-all">
<div class="w-12 h-12 rounded-2xl bg-blue-50 dark:bg-blue-900/20 text-blue-500 flex items-center justify-center shrink-0">
<span class="material-icons">dentistry</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-center mb-1">
<h3 class="font-semibold text-gray-900 dark:text-gray-100 truncate">Leo - Dentist</h3>
<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">Pending</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400">Oct 12 • 10:00 AM - 12:00 PM</p>
</div>
</div>
<div class="bg-white dark:bg-card-dark p-4 rounded-squircle shadow-soft border border-gray-100 dark:border-gray-800 flex items-center gap-4 group cursor-pointer hover:shadow-md transition-all opacity-80">
<div class="w-12 h-12 rounded-2xl bg-purple-50 dark:bg-purple-900/20 text-purple-500 flex items-center justify-center shrink-0">
<span class="material-icons">flight</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-center mb-1">
<h3 class="font-semibold text-gray-900 dark:text-gray-100 truncate">Family Event</h3>
<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300">Excused</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400">Sep 28 • Full Day</p>
</div>
</div>
<div class="bg-white dark:bg-card-dark p-4 rounded-squircle shadow-soft border border-gray-100 dark:border-gray-800 flex items-center gap-4 group cursor-pointer hover:shadow-md transition-all opacity-80">
<div class="w-12 h-12 rounded-2xl bg-red-50 dark:bg-red-900/20 text-red-500 flex items-center justify-center shrink-0">
<span class="material-icons">coronavirus</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-center mb-1">
<h3 class="font-semibold text-gray-900 dark:text-gray-100 truncate">Leo - Flu</h3>
<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300">Excused</span>
</div>
<p class="text-xs text-gray-500 dark:text-gray-400">Sep 15 • 3 Days</p>
</div>
</div>
</div>
<div class="h-8"></div>
</main>
<nav class="bg-white dark:bg-card-dark border-t border-gray-200 dark:border-gray-800 px-6 py-3 flex justify-between items-center sticky bottom-0 z-30 pb-6">
<button class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
<span class="material-icons text-2xl">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary transition-colors">
<span class="material-icons text-2xl">event_available</span>
<span class="text-[10px] font-medium">Attend</span>
</button>
<div class="-mt-8 w-14 h-14 bg-secondary text-white rounded-full flex items-center justify-center shadow-lg shadow-yellow-200 dark:shadow-none border-4 border-white dark:border-gray-900 cursor-pointer transform hover:scale-105 transition-transform">
<span class="material-icons">chat_bubble</span>
</div>
<button class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
<span class="material-icons text-2xl">school</span>
<span class="text-[10px] font-medium">Grades</span>
</button>
<button class="flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors">
<div class="w-6 h-6 rounded-full overflow-hidden border border-gray-200 dark:border-gray-600">
<img alt="Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2SqWPCuku4qY5fifjTIlFhHFoewA1j5Pvs-qNTIT0tPqzbKeoGEO6pLTO77lZLAcH1Qu8KuUxOEPxHrujwLXHzgoRIhDZV3ztVTnkBtOQcsSFVKQrs__gfAQX9Osg95fjgxIL2keTpasfuBPhZuHmZrUVo5oTV7pud8Cb-9C6aSYYkmKd7HTBE3mGY4LOn1gGJDbNTQebsbpP_bNp04srzt3-I9YC51eTT2rdwcbRTHXKmiGx3rEPifW0m_ITQCfbnjuWVn6nn04"/>
</div>
<span class="text-[10px] font-medium">Profile</span>
</button>
</nav>
</div>

</body></html>
