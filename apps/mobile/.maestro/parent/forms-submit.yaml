appId: com.abridge.app
name: Parent Form Submit
tags:
  - parent
  - forms
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to forms
- tapOn:
    id: "nav-forms"

# Verify forms screen loaded
- extendedWaitUntil:
    visible:
      id: "forms-screen"
    timeout: 120000

# Tap Complete to open form detail
- tapOn:
    text: "Complete"

# Verify form detail loaded
- extendedWaitUntil:
    visible:
      id: "form-detail-screen"
    timeout: 60000

# Use Test Fill to populate fields
- tapOn:
    text: "Test Fill"

# Submit form
- tapOn:
    text: "Submit"

# Verify success
- extendedWaitUntil:
    visible: "Form Submitted"
    timeout: 60000
