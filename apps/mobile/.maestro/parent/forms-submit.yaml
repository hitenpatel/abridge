appId: com.abridge.app
name: Parent Form Submit
tags:
  - parent
  - forms
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to forms
- tapOn:
    id: "nav-forms"

# Verify forms screen loaded
- extendedWaitUntil:
    visible: "Forms & Consent"
    timeout: 60000

# Verify pending form shows (forms query can be slow on iOS CI)
- extendedWaitUntil:
    visible: "Photography Consent Form"
    timeout: 120000

# Tap Complete to open form detail
- tapOn:
    text: "Complete"

# Verify form detail loaded
- extendedWaitUntil:
    visible: "Photography Consent Form"
    timeout: 60000

# Use Test Fill to populate fields
- tapOn:
    text: "Test Fill"

# Submit form
- tapOn:
    text: "Submit"

# Verify success
- extendedWaitUntil:
    visible: "Form Submitted"
    timeout: 60000
