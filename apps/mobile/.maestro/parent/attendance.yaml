appId: com.abridge.app
name: Parent Attendance
tags:
  - parent
  - attendance
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to attendance via dev nav button
- tapOn:
    id: "nav-attendance"
- extendedWaitUntil:
    visible: "Attendance Hub"
    timeout: 30000

# Verify absence reporting section
- extendedWaitUntil:
    visible: "Report Absence"
    timeout: 30000
- extendedWaitUntil:
    visible: "Sick"
    timeout: 30000
- extendedWaitUntil:
    visible: "Appointment"
    timeout: 30000
- extendedWaitUntil:
    visible: "Family"
    timeout: 30000
- extendedWaitUntil:
    visible: "Other"
    timeout: 30000

# Verify recent records section (below fold, need to scroll)
- scrollUntilVisible:
    element: "Recent Records"
    direction: DOWN
    timeout: 30000
