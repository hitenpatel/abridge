appId: com.abridge.app
name: Parent Attendance
tags:
  - parent
  - attendance
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to attendance
- tapOn:
    id: "tab-attendance"
- assertVisible:
    text: "Attendance Hub"

# Verify absence reporting section (text is "Report Absence", CSS uppercase is visual only)
- assertVisible: "Report Absence"
- assertVisible: "Sick"
- assertVisible: "Appointment"
- assertVisible: "Family"
- assertVisible: "Other"

# Verify recent records section
- assertVisible: "Recent Records"
