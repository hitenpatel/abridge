appId: com.abridge.app
name: Parent Wellbeing Check-in
tags:
  - parent
  - wellbeing
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home data to load (dev nav buttons only render after loading)
- extendedWaitUntil:
    visible:
      id: "nav-wellbeing"
    timeout: 120000

# Navigate to wellbeing screen
- tapOn:
    id: "nav-wellbeing"

# Verify wellbeing screen loaded
- extendedWaitUntil:
    visible: "How are they feeling today?"
    timeout: 60000

# Use Test Fill to select mood and note
- tapOn:
    text: "Test Fill"

# Verify mood selected and note filled
- extendedWaitUntil:
    visible: "Feeling happy today"
    timeout: 60000

# Submit check-in
- tapOn:
    id: "submit-checkin"

# Verify success (mutation can be slow on CI emulators)
- extendedWaitUntil:
    visible: "Saved!"
    timeout: 60000

# Dismiss alert
- tapOn:
    text: "OK"
