appId: com.abridge.app
name: Parent Tab Navigation
tags:
  - parent
  - navigation
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to Messages
- tapOn:
    id: "tab-messages"
- assertVisible:
    text: "Inbox"

# Navigate to Attendance
- tapOn:
    id: "tab-attendance"
- assertVisible:
    text: "Attendance Hub"

# Navigate to Payments
- tapOn:
    id: "tab-payments"
- assertVisible:
    text: "Wallet"

# Navigate back to Home
- tapOn:
    id: "tab-home"
- assertVisible:
    text: "Report Absence"
