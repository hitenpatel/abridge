appId: com.abridge.app
name: Parent Tab Navigation
tags:
  - parent
  - navigation
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to Messages
- tapOn: "Messages"
- assertVisible:
    text: "Inbox"

# Navigate to Attendance
- tapOn: "Attendance"
- assertVisible:
    text: "Attendance Hub"

# Navigate to Payments
- tapOn: "Payments"
- assertVisible:
    text: "Wallet"

# Navigate back to Home
- tapOn: "Home"
- assertVisible:
    text: "Report Absence"
