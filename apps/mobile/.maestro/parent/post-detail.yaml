appId: com.abridge.app
name: Parent Post Detail
tags:
  - parent
  - posts
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home data AND selectedChildId to be set (wellbeing button needs childId)
- extendedWaitUntil:
    visible:
      id: "nav-wellbeing"
    timeout: 120000

# Scroll down to find a class post in the activity feed
# (feed items render below child switcher, action items, and wellbeing card)
- scrollUntilVisible:
    element:
      id: "feed-classPost"
    direction: DOWN
    timeout: 180000
- tapOn:
    id: "feed-classPost"

# Verify post detail screen loaded (use testID — Maestro can't match text on RN screens on Android)
- extendedWaitUntil:
    visible:
      id: "post-detail-content"
    timeout: 60000
