appId: com.abridge.app
name: Parent Post Detail
tags:
  - parent
  - posts
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (feed needs selectedChildId set first)
- extendedWaitUntil:
    visible:
      id: "nav-attendance"
    timeout: 120000

# Wait for feed to load then scroll to find the post
- scrollUntilVisible:
    element: "art lesson"
    direction: DOWN
    timeout: 60000

# Tap the post to open detail
- tapOn:
    text: "art lesson"

# Verify post detail screen loaded
- extendedWaitUntil:
    visible: "Class Post"
    timeout: 60000

# Verify post content
- extendedWaitUntil:
    visible: "Henri Matisse"
    timeout: 30000
