appId: com.abridge.app
name: Parent Post Detail
tags:
  - parent
  - posts
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home data AND selectedChildId to be set (wellbeing button needs childId)
- extendedWaitUntil:
    visible:
      id: "nav-wellbeing"
    timeout: 120000

# Scroll down to find a class post in the activity feed
# (feed items render below child switcher, action items, and wellbeing card)
- scrollUntilVisible:
    element:
      id: "feed-classPost"
    direction: DOWN
    timeout: 180000
- tapOn:
    id: "feed-classPost"

# Verify post detail screen loaded
- extendedWaitUntil:
    visible: "Class Post"
    timeout: 60000

# Verify post content
- extendedWaitUntil:
    visible: "Henri Matisse"
    timeout: 60000
