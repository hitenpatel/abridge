appId: com.abridge.app
name: Parent Post Detail
tags:
  - parent
  - posts
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home data AND selectedChildId to be set (wellbeing button needs childId)
- extendedWaitUntil:
    visible:
      id: "nav-wellbeing"
    timeout: 120000

# Wait for activity feed to render class posts (feed query starts after childId set)
- extendedWaitUntil:
    visible:
      id: "feed-classPost"
    timeout: 180000

# Scroll down to find the art lesson post and tap it
- scrollUntilVisible:
    element:
      id: "feed-classPost"
    direction: DOWN
    timeout: 60000
- tapOn:
    id: "feed-classPost"

# Verify post detail screen loaded
- extendedWaitUntil:
    visible: "Class Post"
    timeout: 60000

# Verify post content
- extendedWaitUntil:
    visible: "Henri Matisse"
    timeout: 60000
