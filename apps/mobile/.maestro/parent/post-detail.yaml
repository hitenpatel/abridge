appId: com.abridge.app
name: Parent Post Detail
tags:
  - parent
  - posts
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (feed needs selectedChildId set first)
- extendedWaitUntil:
    visible:
      id: "nav-attendance"
    timeout: 120000

# Wait for activity feed to render (feed loads after selectedChildId is set)
- extendedWaitUntil:
    visible:
      id: "feed-classPost"
    timeout: 180000

# Tap the art lesson post using accessibilityLabel (text matching unreliable in ScrollView)
- tapOn:
    label: "art lesson"

# Verify post detail screen loaded
- extendedWaitUntil:
    visible: "Class Post"
    timeout: 60000

# Verify post content
- extendedWaitUntil:
    visible: "Henri Matisse"
    timeout: 60000
