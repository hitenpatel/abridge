appId: com.abridge.app
name: Parent Report Absence
tags:
  - parent
  - attendance
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-attendance"
    timeout: 120000

# Navigate to attendance
- tapOn:
    id: "nav-attendance"
- extendedWaitUntil:
    visible: "Attendance Hub"
    timeout: 60000

# Wait for form to be fully loaded (children query must resolve)
- extendedWaitUntil:
    visible: "Report Absence"
    timeout: 60000

# Select absence reason (Sick is default, tap to confirm)
- tapOn:
    text: "Sick"

# Enter date using testID (more reliable than accessibilityLabel on Android)
- tapOn:
    id: "date-input"
- inputText: "2026-04-01"

# Dismiss keyboard by tapping heading (hideKeyboard fails on some iOS simulators)
- tapOn:
    text: "Attendance Hub"

# Enter optional note
- tapOn:
    id: "note-input"
- inputText: "Feeling unwell"

# Dismiss keyboard by tapping heading
- tapOn:
    text: "Attendance Hub"

# Submit absence using testID
- tapOn:
    id: "submit-absence"

# Verify success alert (mutation can be slow on CI emulators)
- extendedWaitUntil:
    visible: "Absence reported successfully"
    timeout: 120000

# Dismiss alert
- tapOn:
    text: "OK"
