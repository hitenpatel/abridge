appId: com.abridge.app
name: Parent Report Absence
tags:
  - parent
  - attendance
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-attendance"
    timeout: 120000

# Navigate to attendance
- tapOn:
    id: "nav-attendance"
- extendedWaitUntil:
    visible: "Attendance Hub"
    timeout: 60000

# Wait for form to be fully loaded (children query must resolve)
- extendedWaitUntil:
    visible: "Sick"
    timeout: 60000

# Select absence reason
- tapOn:
    text: "Sick"

# Enter date
- tapOn:
    label: "Date"
- inputText: "2026-04-01"
- hideKeyboard

# Enter optional note
- tapOn:
    label: "Reason"
- inputText: "Feeling unwell"
- hideKeyboard

# Submit absence
- tapOn:
    label: "Submit"

# Verify success alert (mutation can be slow on CI emulators)
- extendedWaitUntil:
    visible: "Absence reported successfully"
    timeout: 120000

# Dismiss alert
- tapOn:
    text: "OK"
