appId: com.abridge.app
name: Parent Messages
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to messages via dev nav button
- tapOn:
    id: "nav-messages"
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 10000

# Verify messages screen loaded (data-specific assertions removed — seed data varies)
- assertVisible:
    text: "Inbox"
