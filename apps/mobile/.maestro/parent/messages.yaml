appId: com.abridge.app
name: Parent Messages
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to messages via dev nav button
- tapOn:
    id: "nav-messages"
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 10000

# Verify seeded messages are visible (seed creates messages with URGENT category)
- extendedWaitUntil:
    visible: "URGENT"
    timeout: 15000
