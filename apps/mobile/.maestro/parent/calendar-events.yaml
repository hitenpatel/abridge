appId: com.abridge.app
name: Parent Calendar Events
tags:
  - parent
  - calendar
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to calendar via dev nav button
- tapOn:
    id: "nav-calendar"

# Verify calendar screen loaded
- extendedWaitUntil:
    visible:
      id: "calendar-screen"
    timeout: 60000
- takeScreenshot: native-parent-calendar
