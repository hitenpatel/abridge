appId: com.abridge.app
name: Parent Achievements
tags:
  - parent
  - achievements
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home to load
- extendedWaitUntil:
    visible:
      id: "nav-achievements"
    timeout: 120000

# Navigate to achievements screen
- tapOn:
    id: "nav-achievements"

# Wait for screen transition
- waitForAnimationToEnd
