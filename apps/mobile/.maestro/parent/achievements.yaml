appId: com.abridge.app
name: Parent Achievements
tags:
  - parent
  - achievements
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home data to load (dev nav buttons only render after loading)
- extendedWaitUntil:
    visible:
      id: "nav-achievements"
    timeout: 120000

# Navigate to achievements screen
- tapOn:
    id: "nav-achievements"

# Verify achievements screen loaded
- extendedWaitUntil:
    visible: "Achievements"
    timeout: 60000

# Verify content loaded (may show data or empty state)
- extendedWaitUntil:
    visible:
      id: "total-points"
    timeout: 60000
