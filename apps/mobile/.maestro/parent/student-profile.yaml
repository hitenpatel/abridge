appId: com.abridge.app
name: Parent Student Profile
tags:
  - parent
  - profile
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for home to load and ChildSwitcher to appear (children query loads separately)
- extendedWaitUntil:
    visible:
      id: "child-emily"
    timeout: 120000

# Tap the already-selected child to view profile
- tapOn:
    id: "child-emily"

# Verify student profile screen loaded
- extendedWaitUntil:
    visible:
      id: "student-profile-screen"
    timeout: 60000
