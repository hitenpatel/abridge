appId: com.abridge.app
name: Parent Settings
tags:
  - parent
  - settings
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to settings
- tapOn:
    id: "settings-button"

# Verify settings screen loaded
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 120000
- takeScreenshot: native-parent-settings
