appId: com.abridge.app
name: Parent Settings
tags:
  - parent
  - settings
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to settings
- tapOn:
    id: "settings-button"
- extendedWaitUntil:
    visible: "Profile"
    timeout: 30000
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 30000

# Verify profile section
- extendedWaitUntil:
    visible: "Save Profile"
    timeout: 30000

# Verify notification toggles
- extendedWaitUntil:
    visible: "Push notifications"
    timeout: 30000
- extendedWaitUntil:
    visible: "SMS notifications"
    timeout: 30000
- extendedWaitUntil:
    visible: "Email notifications"
    timeout: 30000
