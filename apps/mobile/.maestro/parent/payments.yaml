appId: com.abridge.app
name: Parent Payments
tags:
  - parent
  - payments
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to payments
- tapOn: "Payments"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 15000

# Verify seeded payment item (School Trip - Science Museum, £15.00)
- extendedWaitUntil:
    visible: "Science Museum"
    timeout: 15000
