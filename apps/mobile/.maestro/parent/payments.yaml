appId: com.abridge.app
name: Parent Payments
tags:
  - parent
  - payments
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to payments
- tapOn:
    id: "tab-payments"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 15000

# Wait for payment data to render (query completes when Wallet appears)
# Use assertVisible instead of scrollUntilVisible — items render near top,
# scrolling DOWN on short content can push them out of view on CI emulators
- extendedWaitUntil:
    visible: "Science Museum"
    timeout: 20000
