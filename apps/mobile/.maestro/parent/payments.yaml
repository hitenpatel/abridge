appId: com.abridge.app
name: Parent Payments
tags:
  - parent
  - payments
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to payments
- tapOn: "Payments"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 15000

# Wait for payment items to load from API
- extendedWaitUntil:
    visible: "Science Museum"
    timeout: 30000
