appId: com.abridge.app
name: Parent Payments
tags:
  - parent
  - payments
---
- runFlow: ../_helpers/login-parent.yaml

# Navigate to payments via dev nav button
- tapOn:
    id: "nav-payments"
- extendedWaitUntil:
    visible: "Wallet"
    timeout: 15000

# Wait for payment data to render
- extendedWaitUntil:
    visible: "Science Museum"
    timeout: 30000
