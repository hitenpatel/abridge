appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to load (count indicator only shows when messages array is populated)
- extendedWaitUntil:
    visible:
      id: "messages-count"
    timeout: 180000

# Tap dev-only shortcut to open the first message
# (Maestro cannot reliably tap Pressable items inside scrollable containers on Android)
- tapOn:
    id: "open-first-message"

# Verify message detail screen loaded (use testID — Maestro can't match text on this RN screen on Android)
- extendedWaitUntil:
    visible:
      id: "message-detail-content"
    timeout: 120000
