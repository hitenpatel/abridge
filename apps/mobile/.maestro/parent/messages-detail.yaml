appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for Inbox header
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 60000

# Scroll to find message (FlatList loads async, scrollUntilVisible retries during loading)
- scrollUntilVisible:
    element: "School Closure"
    direction: DOWN
    timeout: 180000

# Tap the message to open detail
- tapOn:
    text: "School Closure"

# Verify message detail screen
- extendedWaitUntil:
    visible: "severe weather conditions"
    timeout: 60000
- extendedWaitUntil:
    visible: "Oakwood Primary School"
    timeout: 60000
