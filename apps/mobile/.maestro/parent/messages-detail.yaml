appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to load (count indicator only shows when messages array is populated)
- extendedWaitUntil:
    visible:
      id: "messages-count"
    timeout: 180000

# Wait for the urgent message row to render in the FlatList
- extendedWaitUntil:
    visible:
      id: "message-urgent"
    timeout: 60000

# Tap the urgent message row
- tapOn:
    id: "message-urgent"

# Verify message detail screen loaded with full subject
- extendedWaitUntil:
    visible: "School Closure"
    timeout: 120000
