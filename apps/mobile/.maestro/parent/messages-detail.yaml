appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to load (count indicator only shows when messages array is populated)
- extendedWaitUntil:
    visible:
      id: "messages-count"
    timeout: 180000

# Scroll to find the urgent message (FlatList may not render all items immediately)
- scrollUntilVisible:
    element:
      id: "message-urgent"
    direction: DOWN
    timeout: 60000

# Tap the urgent message
- tapOn:
    id: "message-urgent"

# Verify message detail screen (increased timeout for slow navigation on CI)
- extendedWaitUntil:
    visible: "School Closure"
    timeout: 120000
