appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to actually load (not just "Inbox" header which shows during loading)
- extendedWaitUntil:
    visible: "Welcome to SchoolConnect"
    timeout: 120000

# School Closure is the newest message so should be at top, but scroll to be safe
- scrollUntilVisible:
    element: "School Closure"
    direction: UP
    timeout: 60000

# Tap the message to open detail
- tapOn:
    text: "School Closure"

# Verify message detail screen
- extendedWaitUntil:
    visible: "severe weather conditions"
    timeout: 60000
- extendedWaitUntil:
    visible: "Oakwood Primary School"
    timeout: 60000
