appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to load (count indicator only shows when messages array is populated)
- extendedWaitUntil:
    visible:
      id: "messages-count"
    timeout: 180000

# Tap the urgent message using testID (FlatList text matching unreliable on Android)
- tapOn:
    id: "message-urgent"

# Verify message detail screen
- extendedWaitUntil:
    visible: "severe weather conditions"
    timeout: 60000
- extendedWaitUntil:
    visible: "Oakwood Primary School"
    timeout: 60000
