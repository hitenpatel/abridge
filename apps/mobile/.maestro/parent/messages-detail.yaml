appId: com.abridge.app
name: Parent Message Detail
tags:
  - parent
  - messages
---
- runFlow: ../_helpers/login-parent.yaml

# Wait for parent home data to load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000

# Navigate to messages
- tapOn:
    id: "nav-messages"

# Wait for messages to load (count indicator only shows when messages array is populated)
- extendedWaitUntil:
    visible:
      id: "messages-count"
    timeout: 180000

# Tap dev-only shortcut to open the urgent message detail
# (direct Pressable taps in ScrollView/FlatList unreliable with Maestro on Android)
- tapOn:
    id: "open-urgent-message"

# Verify message detail screen loaded with full subject
- extendedWaitUntil:
    visible: "School Closure"
    timeout: 120000
