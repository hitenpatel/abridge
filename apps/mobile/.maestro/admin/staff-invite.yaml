appId: com.abridge.app
name: Admin Staff Invite
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Wait for staff home data to load (session + summary queries must resolve)
- extendedWaitUntil:
    visible:
      id: "nav-staff-management"
    timeout: 120000

# Navigate to staff management
- tapOn:
    id: "nav-staff-management"

# Wait for staff list to finish loading (skeleton hides invite form until staffLoading=false)
- extendedWaitUntil:
    visible:
      id: "role-teacher"
    timeout: 120000

# Fill invite email using testID (more reliable than label on Android)
- tapOn:
    id: "invite-email"
- inputText: "new-teacher@oakwood.sch.uk"
- hideKeyboard

# Wait for role button to be tappable after keyboard dismissal
- extendedWaitUntil:
    visible:
      id: "role-teacher"
    timeout: 60000

# Select TEACHER role using testID
- tapOn:
    id: "role-teacher"

# Tap Send Invite
- tapOn:
    id: "send-invite"

# Verify success (mutation can be slow on CI)
- extendedWaitUntil:
    visible: "Invitation Sent"
    timeout: 120000

# Dismiss alert
- tapOn:
    text: "OK"
