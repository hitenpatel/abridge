appId: com.abridge.app
name: Admin Staff Invite
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Wait for staff home data to load (session + summary queries must resolve)
- extendedWaitUntil:
    visible:
      id: "nav-staff-management"
    timeout: 120000

# Navigate to staff management
- tapOn:
    id: "nav-staff-management"
- extendedWaitUntil:
    visible: "Invite Staff"
    timeout: 60000

# Wait for role selector to be visible
- extendedWaitUntil:
    visible:
      id: "role-teacher"
    timeout: 60000

# Fill invite email
- tapOn:
    label: "Invite Email"
- inputText: "new-teacher@oakwood.sch.uk"
- hideKeyboard

# Wait for role button to be tappable after keyboard dismissal
- extendedWaitUntil:
    visible:
      id: "role-teacher"
    timeout: 60000

# Select TEACHER role using testID (more reliable after keyboard dismissal)
- tapOn:
    id: "role-teacher"

# Tap Send Invite
- tapOn:
    label: "Send Invite"

# Verify success
- extendedWaitUntil:
    visible: "Invitation Sent"
    timeout: 60000

# Dismiss alert
- tapOn:
    text: "OK"
