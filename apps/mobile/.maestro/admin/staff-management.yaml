appId: com.abridge.app
name: Admin Staff Management
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Scroll to find Staff Management button (below posts on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 20000
- tapOn: "Staff Management"

# Brief wait for navigation transition to settle
- wait: 2000

# Wait for staff management page to load (queries schoolId from session, then staff list)
# Uses accessibilityLabel "Invite Staff" on the section View
- extendedWaitUntil:
    visible: "Invite Staff"
    timeout: 45000

# Verify sections (may need scroll on small screens)
- scrollUntilVisible:
    element: "Current Staff"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "ADMIN"
    direction: DOWN
    timeout: 15000
