appId: com.abridge.app
name: Admin Staff Management
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Navigate to Staff Management via dev nav button
- tapOn:
    id: "nav-staff-management"

# Wait for staff management page to load
- extendedWaitUntil:
    visible: "Invite Staff"
    timeout: 60000

# Verify the invite form loaded (Send Invite button)
- extendedWaitUntil:
    visible: "Send Invite"
    timeout: 60000
