appId: com.abridge.app
name: Admin Staff Management
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Scroll to find Staff Management button (below posts on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 20000
- tapOn: "Staff Management"
- extendedWaitUntil:
    visible: "Invite Staff"
    timeout: 15000

# Verify sections
- assertVisible: "Current Staff"
- assertVisible: "TEACHER"
- assertVisible: "ADMIN"

# Verify invite form elements
- assertVisible: "Send Invite"
