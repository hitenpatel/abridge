appId: com.abridge.app
name: Admin Staff Management
tags:
  - admin
  - staff
---
- runFlow: ../_helpers/login-staff.yaml

# Scroll to find Staff Management button (below posts on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 20000
- tapOn: "Staff Management"

# Wait for staff management page to load (queries schoolId from session)
- extendedWaitUntil:
    visible: "Invite Staff"
    timeout: 30000

# Verify sections (may need scroll on small screens)
- scrollUntilVisible:
    element: "Current Staff"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "ADMIN"
    direction: DOWN
    timeout: 15000
