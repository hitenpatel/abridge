appId: com.abridge.app
name: Staff Home Dashboard
tags:
  - staff
  - dashboard
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home elements
- assertVisible:
    text: "Home"
- assertVisible: "Post Update"
- assertVisible: "Recent Posts"

# Admin should see Staff Management (may need scroll on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 20000
