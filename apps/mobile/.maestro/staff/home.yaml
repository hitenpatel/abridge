appId: com.abridge.app
name: Staff Home Dashboard
tags:
  - staff
  - dashboard
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home elements - wait for data to load
- assertVisible:
    text: "Home"
- extendedWaitUntil:
    visible: "Post Update"
    timeout: 15000

# Recent Posts may need scroll on iOS (dev nav buttons add content above)
- scrollUntilVisible:
    element: "Recent Posts"
    direction: DOWN
    timeout: 15000

# Admin should see Staff Management (may need scroll on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 30000
