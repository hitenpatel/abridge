appId: com.abridge.app
name: Staff Home Dashboard
tags:
  - staff
  - dashboard
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home elements - Home tab label should be visible
- assertVisible:
    text: "Home"

# Dev nav buttons confirm staff home loaded and session resolved
# Staff Mgmt button only shows for ADMIN role, confirming session + role loaded
- extendedWaitUntil:
    visible:
      id: "nav-staff-management"
    timeout: 15000
