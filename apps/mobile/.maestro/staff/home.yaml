appId: com.abridge.app
name: Staff Home Dashboard
tags:
  - staff
  - dashboard
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home elements - Home tab label should be visible
- assertVisible:
    text: "Home"

# Post Update and other elements may be below fold (dev nav buttons add content)
- scrollUntilVisible:
    element: "Post Update"
    direction: DOWN
    timeout: 30000
- scrollUntilVisible:
    element: "Recent Posts"
    direction: DOWN
    timeout: 15000

# Admin should see Staff Management (needs scroll on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 30000
