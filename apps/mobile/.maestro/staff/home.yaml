appId: com.abridge.app
name: Staff Home Dashboard
tags:
  - staff
  - dashboard
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home elements
- assertVisible:
    text: "Home"

# Post Update and Recent Posts may need scroll on iOS (dev nav buttons add content)
- scrollUntilVisible:
    element: "Post Update"
    direction: DOWN
    timeout: 10000
- scrollUntilVisible:
    element: "Recent Posts"
    direction: DOWN
    timeout: 10000

# Admin should see Staff Management (may need scroll on small screens)
- scrollUntilVisible:
    element: "Staff Management"
    direction: DOWN
    timeout: 20000
