appId: com.abridge.app
name: Staff Post Compose
tags:
  - staff
  - posts
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home loaded (summary query can be slow on iOS CI)
- extendedWaitUntil:
    visible:
      id: "post-update-cta"
    timeout: 120000

# Tap the Post Update CTA
- tapOn:
    id: "post-update-cta"

# Verify compose post screen loaded
- extendedWaitUntil:
    visible:
      id: "compose-post-screen"
    timeout: 60000

# Use Test Fill to populate class + body
- tapOn:
    text: "Test Fill"

# Wait for body to populate
- extendedWaitUntil:
    visible: "Today we painted pictures in art class!"
    timeout: 60000

# Tap Post button
- tapOn:
    text: "Post"
