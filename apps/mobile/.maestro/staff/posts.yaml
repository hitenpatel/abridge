appId: com.abridge.app
name: Staff Posts
tags:
  - staff
  - posts
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home loaded
- extendedWaitUntil:
    visible: "Home"
    timeout: 60000

# "View All" link is in the Recent Posts section (visible without scroll on most screens)
- extendedWaitUntil:
    visible: "View All"
    timeout: 60000
