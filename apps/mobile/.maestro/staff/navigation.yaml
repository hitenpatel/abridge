appId: com.abridge.app
name: Staff Tab Navigation
tags:
  - staff
  - navigation
---
- runFlow: ../_helpers/login-staff.yaml

# Navigate to Messages
- tapOn: "Messages"
- assertVisible:
    text: "Inbox"

# Navigate to Attendance
- tapOn: "Attendance"
- assertVisible:
    text: "Attendance"

# Navigate to Payments
- tapOn: "Payments"
- assertVisible:
    text: "Payments"

# Navigate back to Home
- tapOn: "Home"
- assertVisible:
    text: "Post Update"
