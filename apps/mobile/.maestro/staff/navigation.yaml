appId: com.abridge.app
name: Staff Tab Navigation
tags:
  - staff
  - navigation
---
- runFlow: ../_helpers/login-staff.yaml

# Navigate to Messages
- tapOn:
    id: "tab-messages"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Inbox"
    timeout: 10000

# Navigate to Attendance
- tapOn:
    id: "tab-attendance"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Attendance"
    timeout: 10000

# Navigate to Payments
- tapOn:
    id: "tab-payments"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Payments"
    timeout: 10000

# Navigate back to Home
- tapOn:
    id: "tab-home"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Post Update"
    timeout: 10000
