appId: com.abridge.app
name: Staff Tab Navigation
tags:
  - staff
  - navigation
---
- runFlow: ../_helpers/login-staff.yaml

# Navigate to Messages
- tapOn:
    id: "tab-messages"
- assertVisible:
    text: "Inbox"

# Navigate to Attendance
- tapOn:
    id: "tab-attendance"
- assertVisible:
    text: "Attendance"

# Navigate to Payments
- tapOn:
    id: "tab-payments"
- assertVisible:
    text: "Payments"

# Navigate back to Home
- tapOn:
    id: "tab-home"
- assertVisible:
    text: "Post Update"
