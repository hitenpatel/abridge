appId: com.abridge.app
name: Staff Send Message
tags:
  - staff
  - messages
---
- runFlow: ../_helpers/login-staff.yaml

# Verify staff home loaded (summary query can be slow on iOS CI)
- extendedWaitUntil:
    visible: "Post Update"
    timeout: 120000

# Scroll down to find New Message card
- scrollUntilVisible:
    element: "New Message"
    direction: DOWN
    timeout: 60000

# Tap New Message card
- tapOn:
    label: "New Message"

# Verify compose screen loaded
- extendedWaitUntil:
    visible: "All Parents"
    timeout: 60000

# Use Test Fill
- tapOn:
    text: "Test Fill"

# Wait for subject field to populate
- extendedWaitUntil:
    visible: "Test Message"
    timeout: 60000

# Tap send button (button text is "Post to Class")
- tapOn:
    text: "Post to Class"

# Verify success
- extendedWaitUntil:
    visible: "Sent!"
    timeout: 60000

# Dismiss alert
- tapOn:
    text: "OK"
