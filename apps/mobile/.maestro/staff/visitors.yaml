appId: com.abridge.app
name: Staff Visitors
tags:
  - staff
  - visitors
---
- runFlow: ../_helpers/login-staff.yaml

# Navigate to visitors via dev nav button
- tapOn:
    id: "nav-visitors"
- extendedWaitUntil:
    visible: "Visitors"
    timeout: 60000

# Verify visitors screen loaded with content
- extendedWaitUntil:
    visible: "Visitor"
    timeout: 60000

# Verify purpose selector is visible
- extendedWaitUntil:
    visible: "Meeting"
    timeout: 60000
