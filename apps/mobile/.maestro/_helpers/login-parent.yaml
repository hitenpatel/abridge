appId: com.abridge.app
---
# Retry app launch up to 3 times to handle intermittent iOS simulator crashes
- retry:
    maxRetries: 3
    commands:
      - stopApp
      - clearState
      - launchApp:
          stopApp: false
      - extendedWaitUntil:
          visible: "Sign in to continue"
          timeout: 30000

# Wait for test button to render
- extendedWaitUntil:
    visible:
      id: "test-parent"
    timeout: 60000

# Use dev test button (testID tap is more reliable than text tap)
- tapOn:
    id: "test-parent"

# Wait for home screen data to fully load
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
