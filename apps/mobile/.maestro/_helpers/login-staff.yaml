appId: com.abridge.app
---
- clearState
- launchApp

# Wait for app to load (iOS Metro re-bundle after clearState is very slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 600000

# Wait for test button to render (JS bridge must be fully connected)
- extendedWaitUntil:
    visible: "Test Staff"
    timeout: 60000

# Use dev test button (bypasses TextInput which has Maestro iOS issues)
- tapOn:
    text: "Test Staff"

# Verify redirect to home (iOS simulator with Metro is slower)
- extendedWaitUntil:
    visible: "Home"
    timeout: 120000

# Wait for home screen data to fully load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
