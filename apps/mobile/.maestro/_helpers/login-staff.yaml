appId: com.abridge.app
---
- clearState
- launchApp

# Wait for app to load
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 120000

# Wait for test button to render (JS bridge must be fully connected)
- extendedWaitUntil:
    visible:
      id: "test-staff"
    timeout: 60000

# Use dev test button (testID tap is more reliable than text tap)
- tapOn:
    id: "test-staff"

# Wait for home screen data to fully load (nav buttons render after isLoading)
# Skip unreliable "Home" tab bar text check — nav-messages testID confirms home loaded
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
