appId: com.abridge.app
---
- clearState
- launchApp

# Wait for app to load (iOS Metro re-bundle after clearState is slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 300000

# Use dev test button (bypasses TextInput which has Maestro iOS issues)
- tapOn:
    text: "Test Staff"

# Verify redirect to home (iOS simulator with Metro is slower)
- extendedWaitUntil:
    visible: "Home"
    timeout: 120000

# Wait for home screen data to fully load (nav buttons render after isLoading)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
