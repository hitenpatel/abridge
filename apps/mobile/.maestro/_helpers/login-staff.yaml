appId: com.abridge.app
---
- clearState
- launchApp

# Wait for app to load (iOS Metro re-bundle after clearState is slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 90000

# Enter email
- tapOn:
    id: "email-input"
- inputText: "claire@oakwood.sch.uk"
- hideKeyboard

# Enter password
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard

# Submit
- tapOn:
    text: "Sign In"

# Verify redirect to home (iOS simulator with Metro is slower)
- extendedWaitUntil:
    visible: "Home"
    timeout: 60000
