appId: com.abridge.app
name: Register Flow
tags:
  - auth
---
# Mobile app only has login - no register screen
# This flow validates the login screen renders correctly
- clearState
- launchApp

# Wait for app to load (CI emulators are slow)
- extendedWaitUntil:
    visible: "Abridge"
    timeout: 60000

- assertVisible: "Sign in to continue"
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible: "Sign In"
