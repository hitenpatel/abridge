appId: com.abridge.app
name: Register Flow
tags:
  - auth
---
# Mobile app only has login - no register screen
# This flow validates the login screen renders correctly
- clearState
- launchApp

# Wait for app to load (iOS Metro re-bundle after clearState is slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 600000
- extendedWaitUntil:
    visible: "Email"
    timeout: 60000
- extendedWaitUntil:
    visible: "Password"
    timeout: 60000
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 60000
