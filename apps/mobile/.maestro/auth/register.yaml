appId: com.abridge.app
name: Register Flow
tags:
  - auth
---
# Mobile app only has login - no register screen
# This flow validates the login screen renders correctly

# Retry app launch to handle intermittent iOS simulator crashes
- retry:
    maxRetries: 3
    commands:
      - stopApp
      - clearState
      - launchApp:
          stopApp: false
      - extendedWaitUntil:
          visible: "Sign in to continue"
          timeout: 30000

- extendedWaitUntil:
    visible: "Email"
    timeout: 60000
- extendedWaitUntil:
    visible: "Password"
    timeout: 60000
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 60000
