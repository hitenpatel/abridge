appId: com.abridge.app
name: Logout Flow
tags:
  - auth
---
- runFlow: ../_helpers/login-parent.yaml

# Tap logout button (icon-only, uses accessibilityLabel)
# Try both id and label selectors for Android compatibility
- tapOn:
    id: "Log Out"

# Wait for redirect back to login screen
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 15000
