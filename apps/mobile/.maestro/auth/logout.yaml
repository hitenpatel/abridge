appId: com.abridge.app
name: Logout Flow
tags:
  - auth
---
- runFlow: ../_helpers/login-parent.yaml

# Tap logout button (icon-only, matched by testID)
- tapOn:
    id: "logout-button"

# Wait for redirect back to login screen
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 120000
