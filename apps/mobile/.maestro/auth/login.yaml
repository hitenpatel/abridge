appId: com.abridge.app
name: Login Flow
tags:
  - auth
  - smoke
---
- clearState
- launchApp

# Wait for app to load (iOS Metro re-bundle after clearState is slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 90000

# Enter email
- tapOn:
    id: "email-input"
- inputText: "sarah@example.com"
- hideKeyboard

# Enter password
- tapOn:
    id: "password-input"
- inputText: "password123"
- hideKeyboard

# Submit
- tapOn:
    text: "Sign In"

# Verify redirect to home
- extendedWaitUntil:
    visible: "Home"
    timeout: 60000
