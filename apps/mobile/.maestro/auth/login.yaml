appId: com.abridge.app
name: Login Flow
tags:
  - auth
  - smoke
---
- clearState
- launchApp

# Wait for app to load
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 120000

# Wait for test button to render (JS bridge must be fully connected)
- extendedWaitUntil:
    visible:
      id: "test-parent"
    timeout: 60000

# Use dev test button (testID tap is more reliable than text tap)
- tapOn:
    id: "test-parent"

# Verify redirect to home (nav-messages confirms home fully loaded)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
