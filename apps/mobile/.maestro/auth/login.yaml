appId: com.abridge.app
name: Login Flow
tags:
  - auth
  - smoke
---
# Retry app launch to handle intermittent iOS simulator crashes
- retry:
    maxRetries: 3
    commands:
      - stopApp
      - clearState
      - launchApp:
          stopApp: false
      - extendedWaitUntil:
          visible: "Sign in to continue"
          timeout: 30000

# Wait for test button to render
- extendedWaitUntil:
    visible:
      id: "test-parent"
    timeout: 60000

# Use dev test button (testID tap is more reliable than text tap)
- tapOn:
    id: "test-parent"

# Verify redirect to home (nav-messages confirms home fully loaded)
- extendedWaitUntil:
    visible:
      id: "nav-messages"
    timeout: 120000
