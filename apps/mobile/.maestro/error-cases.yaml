appId: com.abridge.app
name: Error Cases
tags:
  - errors
---
- clearState
- launchApp

# Wait for app to load (CI emulators are slow)
- extendedWaitUntil:
    visible: "Sign in to continue"
    timeout: 120000

# Test empty fields - tap Sign In without entering anything
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: "Please fill in all fields"
    timeout: 10000
- tapOn: "OK"
