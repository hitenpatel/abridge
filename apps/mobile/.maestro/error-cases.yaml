appId: com.abridge.app
name: Error Cases
tags:
  - errors
---
- clearState
- launchApp

# Wait for app to load (CI emulators are slow)
- extendedWaitUntil:
    visible: "Abridge"
    timeout: 60000

- assertVisible: "Sign in to continue"

# Test invalid login credentials
- tapOn:
    text: "Email"
- inputText: "wrong@example.com"
- hideKeyboard
- tapOn:
    text: "Password"
- inputText: "wrongpassword"
- hideKeyboard
- tapOn:
    text: "Sign In"

# Should show error alert
- extendedWaitUntil:
    visible: "Login Failed"
    timeout: 10000
- tapOn: "OK"

# Test empty fields
- clearState
- launchApp

# Wait for app to load again
- extendedWaitUntil:
    visible: "Abridge"
    timeout: 60000

- assertVisible: "Sign in to continue"
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: "Please fill in all fields"
    timeout: 10000
- tapOn: "OK"
