appId: com.abridge.app
name: Error Cases
tags:
  - errors
---
# Retry app launch to handle intermittent iOS simulator crashes
- retry:
    maxRetries: 3
    commands:
      - stopApp
      - clearState
      - launchApp:
          stopApp: false
      - extendedWaitUntil:
          visible: "Sign in to continue"
          timeout: 30000

# Test empty fields - tap Sign In without entering anything
- tapOn:
    text: "Sign In"
- extendedWaitUntil:
    visible: "Please fill in all fields"
    timeout: 60000
- tapOn: "OK"
