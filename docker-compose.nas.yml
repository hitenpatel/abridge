version: "3.8"

services:
  schoolconnect-db:
    image: postgres:16-alpine
    container_name: schoolconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - schoolconnect-pgdata:/var/lib/postgresql/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  schoolconnect-redis:
    image: redis:7-alpine
    container_name: schoolconnect-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - schoolconnect-redis-data:/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  schoolconnect-elasticsearch:
    image: elasticsearch:8.11.0
    container_name: schoolconnect-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    volumes:
      - schoolconnect-esdata:/usr/share/elasticsearch/data
    networks:
      - homelab
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  schoolconnect-migrate:
    image: schoolconnect-api
    container_name: schoolconnect-migrate
    restart: "no"
    working_dir: /app
    depends_on:
      schoolconnect-db:
        condition: service_healthy
    command: ./packages/db/node_modules/.bin/prisma migrate deploy --schema ./packages/db/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@schoolconnect-db:5432/${POSTGRES_DB}
    networks:
      - homelab
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  schoolconnect-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: schoolconnect-api
    container_name: schoolconnect-api
    restart: unless-stopped
    depends_on:
      schoolconnect-db:
        condition: service_healthy
      schoolconnect-redis:
        condition: service_healthy
      schoolconnect-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@schoolconnect-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://schoolconnect-redis:6379
      ELASTICSEARCH_URL: http://schoolconnect-elasticsearch:9200
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://school-api.hiten-patel.co.uk
      SETUP_KEY: ${SETUP_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      WEB_URL: https://school.hiten-patel.co.uk
    networks:
      - homelab
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.http.routers.school-api.rule=Host(`school-api.hiten-patel.co.uk`)
      - traefik.http.routers.school-api.tls=true
      - traefik.http.routers.school-api.entryPoints=web-secure
      - traefik.http.routers.school-api.tls.certresolver=myresolver
      - traefik.http.services.school-api.loadbalancer.server.port=4000

  schoolconnect-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://school-api.hiten-patel.co.uk
    image: schoolconnect-web
    container_name: schoolconnect-web
    restart: unless-stopped
    depends_on:
      - schoolconnect-api
    networks:
      - homelab
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.http.routers.school-web.rule=Host(`school.hiten-patel.co.uk`)
      - traefik.http.routers.school-web.tls=true
      - traefik.http.routers.school-web.entryPoints=web-secure
      - traefik.http.routers.school-web.tls.certresolver=myresolver
      - traefik.http.services.school-web.loadbalancer.server.port=3000

volumes:
  schoolconnect-pgdata:
  schoolconnect-redis-data:
  schoolconnect-esdata:

networks:
  homelab:
    name: home-server_homelab
    external: true
