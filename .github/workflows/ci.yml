name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # Nightly at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Generate Playwright tests
      - name: Generate Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:playwright --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:playwright
          fi

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      # Start API and Web servers in background
      - name: Start servers
        run: |
          pnpm --filter @schoolconnect/db db:push &
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          NODE_ENV: test

      # Run Playwright tests
      - name: Run Playwright tests
        run: pnpm --filter @schoolconnect/e2e test:web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          NODE_ENV: test

      # Upload test report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  e2e-mobile:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Generate Maestro flows
      - name: Generate Maestro flows
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:maestro --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:maestro
          fi

      # Install Maestro CLI
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      # Start API server
      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/db db:push
          pnpm --filter @schoolconnect/api dev &
          sleep 5
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          NODE_ENV: test

      # Set up Android emulator and run Maestro flows
      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            cd apps/mobile
            npx expo run:android
            cd ../../packages/e2e
            maestro test generated/maestro/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          NODE_ENV: test

      # Upload Maestro report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-report
          path: packages/e2e/.maestro/
          retention-days: 7
