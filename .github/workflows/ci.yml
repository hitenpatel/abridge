name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Type-check + unit tests (no DB needed) ──

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        run: pnpm --filter @schoolconnect/db build

      - name: Type-check API
        run: pnpm --filter @schoolconnect/api exec tsc --noEmit

      - name: Type-check Web
        run: pnpm --filter @schoolconnect/web exec tsc --noEmit

      - name: Run API unit tests
        run: pnpm --filter @schoolconnect/api test -- --run

      - name: Run mobile unit tests
        run: pnpm --filter @schoolconnect/mobile test:ci

  e2e-web:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
      BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
      BETTER_AUTH_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql postgresql-client > /dev/null
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          sudo pg_ctlcluster "$PG_VER" main start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb schoolconnect_test

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Push database schema and seed
        run: |
          pnpm --filter @schoolconnect/db db:generate
          pnpm --filter @schoolconnect/db db:push
          pnpm --filter @schoolconnect/db db:seed

      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            'SETUP_KEY=admin123' \
            > apps/api/.env

      - name: Build packages
        run: pnpm build

      - name: Start servers and run E2E tests
        run: |
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then echo "ERROR: API failed to start"; exit 1; fi
          done
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web server is ready"
              break
            fi
            echo "Waiting for Web... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then echo "ERROR: Web failed to start"; exit 1; fi
          done
          npx playwright test

      - name: Capture app screenshots (desktop + mobile)
        if: success()
        run: node scripts/capture-screenshots.js screenshots

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report.json
            playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 30

  # ── Android: build APK once, then run test shards in parallel ──

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h /

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: pnpm install --frozen-lockfile

      - name: Deduplicate React for Metro bundling
        run: |
          find node_modules -path "*/node_modules/react/index.js" \
            -not -path "node_modules/react/index.js" \
            -not -path "apps/mobile/node_modules/react/index.js" \
            | while read f; do rm -rf "$(dirname "$f")"; done

      - name: Expo prebuild Android
        run: |
          cd apps/mobile
          EXPO_PUBLIC_API_URL=http://10.0.2.2:4000 npx expo prebuild --platform android --no-install

      - name: Disable debug dev-server (use embedded bundle)
        run: |
          cd apps/mobile/android/app
          sed -i '/autolinkLibrariesWithApp/i\    debuggableVariants = []' build.gradle

      - name: Restore Gradle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json') }}
          restore-keys: gradle-

      - name: Build debug APK
        env:
          EXPO_PUBLIC_API_URL: http://10.0.2.2:4000
          EXPO_PUBLIC_E2E: "1"
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug

      - name: Save Gradle cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/package.json') }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  e2e-android:
    needs: build-android
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
      BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
      BETTER_AUTH_URL: http://localhost:4000
      NODE_ENV: test
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h /

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql postgresql-client > /dev/null
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          sudo pg_ctlcluster "$PG_VER" main start
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb schoolconnect_test

      - run: pnpm install --frozen-lockfile

      - name: Push database schema and seed
        run: |
          pnpm --filter @schoolconnect/db db:generate
          pnpm --filter @schoolconnect/db db:push
          pnpm --filter @schoolconnect/db db:seed

      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            'SETUP_KEY=admin123' \
            > apps/api/.env

      - name: Build packages
        run: pnpm build

      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/api dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then echo "ERROR: API failed to start"; exit 1; fi
          done

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          ram-size: 4096
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: true
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done;'
            sleep 10
            adb install apk/app-debug.apk
            adb reverse tcp:4000 tcp:4000
            adb logcat -G 16M
            adb logcat -c
            adb shell am start -n com.abridge.app/.MainActivity
            sleep 20
            echo "=== Running all Maestro tests ==="
            $HOME/.maestro/bin/maestro test apps/mobile/.maestro/ --format junit --output maestro-report.xml --debug-output $GITHUB_WORKSPACE/maestro-debug; echo $? > /tmp/maestro-exit
            echo "=== Maestro exit code: $(cat /tmp/maestro-exit) ==="
            # Collect takeScreenshot PNGs into maestro-debug for artifact upload
            mkdir -p $GITHUB_WORKSPACE/maestro-debug/screenshots
            mv $GITHUB_WORKSPACE/native-*.png $GITHUB_WORKSPACE/maestro-debug/screenshots/ 2>/dev/null || true
            echo "Native screenshots collected: $(ls $GITHUB_WORKSPACE/maestro-debug/screenshots/*.png 2>/dev/null | wc -l)"
            exit $(cat /tmp/maestro-exit)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-report-android
          path: |
            maestro-report.xml
            maestro-debug/
          include-hidden-files: true
          retention-days: 7

  # ── Firebase Robo test ──

  firebase-robo:
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: latest

      - name: Authenticate gcloud
        run: |
          echo '${{ secrets.GCLOUD_SERVICE_KEY }}' > /tmp/gcloud-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          rm /tmp/gcloud-key.json

      - name: Run Firebase Robo test
        run: |
          gcloud firebase test android run \
            --type robo \
            --app apk/app-debug.apk \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 300s \
            --client-details matrixLabel="Robo crawl"

  # ── iOS ──

  e2e-mobile-ios:
    runs-on: macos-latest
    env:
      BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
      BETTER_AUTH_URL: http://localhost:4000
      EXPO_PUBLIC_API_URL: http://localhost:4000
      EXPO_PUBLIC_E2E: "1"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          brew install postgresql@16
          export PATH="/opt/homebrew/opt/postgresql@16/bin:$PATH"
          brew services start postgresql@16
          sleep 3
          createdb schoolconnect_test
          psql -d schoolconnect_test -c "ALTER USER $(whoami) WITH PASSWORD 'postgres';"
          echo "/opt/homebrew/opt/postgresql@16/bin" >> $GITHUB_PATH

      - run: pnpm install --frozen-lockfile

      - name: Deduplicate React for Metro bundling
        run: |
          find node_modules -path "*/node_modules/react/index.js" \
            -not -path "node_modules/react/index.js" \
            -not -path "apps/mobile/node_modules/react/index.js" \
            | while read f; do rm -rf "$(dirname "$f")"; done

      - name: Push database schema and seed
        env:
          DATABASE_URL: postgresql://runner:postgres@localhost:5432/schoolconnect_test
        run: |
          pnpm --filter @schoolconnect/db db:generate
          pnpm --filter @schoolconnect/db db:push
          pnpm --filter @schoolconnect/db db:seed

      - name: Create API .env
        run: |
          printf '%s\n' \
            "DATABASE_URL=postgresql://runner:postgres@localhost:5432/schoolconnect_test" \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            'SETUP_KEY=admin123' \
            > apps/api/.env

      - name: Build packages
        run: pnpm build

      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/api dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then echo "ERROR: API failed to start"; exit 1; fi
          done

      - name: Expo prebuild iOS
        run: |
          cd apps/mobile
          npx expo prebuild --platform ios --no-install

      - name: Restore CocoaPods cache
        uses: actions/cache/restore@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Pod install
        run: |
          cd apps/mobile/ios
          pod install

      - name: Save CocoaPods cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}

      - name: Restore Xcode derived data cache
        uses: actions/cache/restore@v4
        with:
          path: apps/mobile/ios/build
          key: xcode-release-${{ hashFiles('apps/mobile/ios/Podfile.lock', 'apps/mobile/package.json') }}
          restore-keys: xcode-release-

      - name: Build iOS app (Release — embeds JS bundle, no Metro needed)
        env:
          EXPO_PUBLIC_API_URL: http://localhost:4000
          EXPO_PUBLIC_E2E: '1'
        run: |
          cd apps/mobile/ios
          xcodebuild -workspace Abridge.xcworkspace -scheme Abridge -sdk iphonesimulator -configuration Release -derivedDataPath build build

      - name: Save Xcode derived data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: apps/mobile/ios/build
          key: xcode-release-${{ hashFiles('apps/mobile/ios/Podfile.lock', 'apps/mobile/package.json') }}

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS simulator and run tests
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 240000
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " )
          echo "Using device: $DEVICE"
          xcrun simctl boot "$DEVICE"
          xcrun simctl install "$DEVICE" apps/mobile/ios/build/Build/Products/Release-iphonesimulator/Abridge.app

          echo "=== Pre-warming simulator (launch app then wait) ==="
          xcrun simctl launch "$DEVICE" com.abridge.app
          sleep 15
          xcrun simctl terminate "$DEVICE" com.abridge.app

          echo "=== Verifying sign-in API ==="
          curl -s -o /tmp/signin-resp.json -w "HTTP %{http_code}\n" -X POST http://localhost:4000/api/auth/sign-in/email \
            -H "Content-Type: application/json" \
            -d '{"email":"sarah@example.com","password":"password123"}'
          echo "Body:" && head -c 500 /tmp/signin-resp.json && echo ""

          echo "=== Running Maestro (no Metro — JS bundle embedded) ==="
          maestro test apps/mobile/.maestro/ --format junit --output maestro-report.xml --debug-output $GITHUB_WORKSPACE/maestro-debug; echo $? > /tmp/maestro-exit

          echo "=== Maestro debug output ==="
          ls -la $GITHUB_WORKSPACE/maestro-debug/ 2>/dev/null || echo "No maestro-debug directory"
          find $GITHUB_WORKSPACE/maestro-debug -name "*.png" 2>/dev/null | head -20 || true

          # Collect takeScreenshot PNGs into maestro-debug for artifact upload
          mkdir -p $GITHUB_WORKSPACE/maestro-debug/screenshots
          mv $GITHUB_WORKSPACE/native-*.png $GITHUB_WORKSPACE/maestro-debug/screenshots/ 2>/dev/null || true
          ls $HOME/native-*.png 2>/dev/null && mv $HOME/native-*.png $GITHUB_WORKSPACE/maestro-debug/screenshots/ 2>/dev/null || true
          find $GITHUB_WORKSPACE -maxdepth 1 -name "native-*.png" -exec mv {} $GITHUB_WORKSPACE/maestro-debug/screenshots/ \; 2>/dev/null || true
          echo "Native screenshots collected: $(ls $GITHUB_WORKSPACE/maestro-debug/screenshots/*.png 2>/dev/null | wc -l)"

          echo "=== Simulator logs (all app output) ==="
          xcrun simctl spawn "$DEVICE" log show --predicate 'processImagePath CONTAINS "Abridge"' --last 30m --style compact 2>/dev/null | tail -50 || true

          echo "=== Maestro exit code: $(cat /tmp/maestro-exit) ==="
          exit $(cat /tmp/maestro-exit)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-report-ios
          path: |
            maestro-report.xml
            maestro-debug/
          include-hidden-files: true
          retention-days: 7

  # ── Dashboard deployment ──

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: [e2e-web, e2e-android, e2e-mobile-ios]
    if: always() && github.ref == 'refs/heads/main'
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install e2e-dashboard
        run: npm install hitenpatel/e2e-dashboard

      - name: Checkout gh-pages
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git worktree add dashboard-deploy gh-pages
          else
            mkdir dashboard-deploy
            cd dashboard-deploy && git init && git checkout --orphan gh-pages
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi

      - name: Copy dashboard SPA
        run: |
          cp node_modules/e2e-dashboard/dashboard/index.html dashboard-deploy/index.html
          mkdir -p dashboard-deploy/data

      - name: Parse results
        run: |
          npx e2e-dashboard parse \
            --run-id "${{ github.run_id }}" \
            --sha "${GITHUB_SHA::7}" \
            --message "$(git log -1 --format=%s | head -c 120)" \
            --branch "${{ github.ref_name }}" \
            --playwright artifacts/playwright-report/playwright-report.json \
            --maestro-android artifacts/maestro-report-android/maestro-report.xml \
            --maestro-ios artifacts/maestro-report-ios/maestro-report.xml \
            --screenshots-dir artifacts/ \
            --output-dir dashboard-deploy/screenshots/run-${{ github.run_id }}/ \
            > new-run.json

      - name: Merge history
        run: |
          npx e2e-dashboard merge \
            --history dashboard-deploy/data/history.json \
            --new new-run.json \
            --output dashboard-deploy/data/history.json \
            --max-runs 50 \
            --screenshots-base dashboard-deploy/screenshots/

      - name: Deploy to gh-pages
        run: |
          cd dashboard-deploy
          git add -A
          git -c user.name="github-actions" -c user.email="actions@github.com" \
            commit -m "update dashboard: run ${{ github.run_id }}" --allow-empty
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" 2>/dev/null || true
          git push origin gh-pages --force
