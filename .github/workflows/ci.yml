name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # Nightly at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-web:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Generate Playwright tests
      - name: Generate Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:playwright --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:playwright
          fi

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      # Push database schema (must complete before servers start)
      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

      # Start API and Web servers in background
      - name: Start servers
        run: |
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Run Playwright tests
      - name: Run Playwright tests
        run: pnpm --filter @schoolconnect/e2e test:web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Upload test report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  e2e-mobile:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Generate Maestro flows
      - name: Generate Maestro flows
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:maestro --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:maestro
          fi

      # Install Maestro CLI
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      # Push database schema
      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

      # Start API server
      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/api dev &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Set up Android emulator and run Maestro flows
      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            cd apps/mobile
            npx expo run:android
            cd ../../packages/e2e
            maestro test generated/maestro/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Upload Maestro report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-report-android
          path: packages/e2e/.maestro/
          retention-days: 7

  e2e-mobile-ios:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Maestro requires Java 17+
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - run: pnpm install --frozen-lockfile

      # Install Maestro CLI
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      # macOS runners don't support service containers — install PostgreSQL via Homebrew
      - name: Set up PostgreSQL
        run: |
          brew install postgresql@16
          brew services start postgresql@16
          sleep 3
          /opt/homebrew/opt/postgresql@16/bin/createdb -h localhost schoolconnect_test

      # Push database schema
      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push
        env:
          DATABASE_URL: postgresql://localhost:5432/schoolconnect_test

      # Start API server
      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/api dev &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
        env:
          DATABASE_URL: postgresql://localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Boot iOS simulator (Xcode 16 on macos-15 has iPhone 16 with iOS 18)
      - name: Boot iOS simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; \
            iphones=[d for r in devs for d in devs[r] if 'iPhone' in d['name'] and d['isAvailable']]; \
            print(iphones[-1]['udid'])")
          xcrun simctl boot "$DEVICE"
          echo "Booted simulator: $DEVICE"

      # Start Expo dev server — this auto-installs Expo Go on the booted simulator
      - name: Start Expo dev server
        run: |
          cd apps/mobile
          npx expo start --ios --no-dev &
          cd ../..
          sleep 30
        env:
          EXPO_PUBLIC_API_URL: http://localhost:4000

      # Generate Maestro flows for Expo Go mode
      - name: Generate Maestro flows
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:maestro --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:maestro
          fi
        env:
          MAESTRO_APP_ID: host.exp.Exponent
          MAESTRO_EXPO_URL: exp://localhost:8081

      # Run flows sequentially (concurrent execution causes session interference)
      - name: Run Maestro flows
        run: |
          passed=0
          failed=0
          for flow in packages/e2e/generated/maestro/*.yaml; do
            name=$(basename "$flow")
            echo "--- Running: $name ---"
            if maestro test "$flow" --debug-output maestro-debug; then
              echo "PASSED: $name"
              ((passed++))
            else
              echo "FAILED: $name"
              ((failed++))
            fi
          done
          echo "Results: $passed passed, $failed failed"
          [ "$failed" -eq 0 ] || exit 1

      # Upload debug artifacts on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-report-ios
          path: maestro-debug/
          retention-days: 7
