name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' # Nightly at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql postgresql-client
          pg_lsclusters
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"
          # Verify connection
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolconnect_test -c "SELECT 1;"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql postgresql-client
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolconnect_test -c "SELECT 1;"

      - run: pnpm install --frozen-lockfile

      # Generate Playwright tests
      - name: Generate Playwright tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:playwright --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:playwright
          fi

      # Install Playwright browsers
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/e2e

      # Push database schema (must complete before servers start)
      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

      # Create .env for API (dev script uses node --env-file=.env)
      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            > apps/api/.env

      # Start API and Web servers in background
      - name: Start servers
        run: |
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "ERROR: API server failed to start"
              exit 1
            fi
          done
          # Wait for Web server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web server is ready"
              exit 0
            fi
            echo "Waiting for Web... ($i/30)"
            sleep 2
          done
          echo "ERROR: Web server failed to start"
          exit 1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NODE_ENV: test

      # Run Playwright tests
      - name: Run Playwright tests
        run: pnpm --filter @schoolconnect/e2e test:web
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NODE_ENV: test

      # Upload test report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  e2e-mobile-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install and start PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql postgresql-client
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolconnect_test -c "SELECT 1;"

      - run: pnpm install --frozen-lockfile

      # Generate Maestro flows
      - name: Generate Maestro flows
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm --filter @schoolconnect/e2e generate:maestro --tags=smoke
          else
            pnpm --filter @schoolconnect/e2e generate:maestro
          fi

      # Install Maestro CLI
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> $GITHUB_PATH

      # Push database schema
      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

      # Create .env for API
      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            > apps/api/.env

      # Start API server
      - name: Start API server
        run: |
          pnpm --filter @schoolconnect/api dev &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "ERROR: API server failed to start"
          exit 1
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Set up Android emulator and run Maestro flows
      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            cd apps/mobile
            pnpm exec expo run:android
            cd ../../packages/e2e
            maestro test generated/maestro/
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
          BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
          BETTER_AUTH_URL: http://localhost:4000
          NODE_ENV: test

      # Upload Maestro report on failure
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-report-android
          path: packages/e2e/.maestro/
          retention-days: 7
