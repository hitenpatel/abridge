name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install and start PostgreSQL
        run: |
          apt-get update -qq && apt-get install -y -qq postgresql postgresql-client > /dev/null
          pg_ctlcluster 15 main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
