name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install and start PostgreSQL
        run: |
          apt-get update -qq && apt-get install -y -qq postgresql postgresql-client > /dev/null
          pg_ctlcluster 15 main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-web:
    runs-on: docker
    container:
      image: node:24-bookworm
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
        BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
        BETTER_AUTH_URL: http://localhost:4000
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NODE_ENV: test
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq postgresql postgresql-client curl \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 \
            libxdamage1 libgbm1 libpango-1.0-0 libcairo2 libasound2 libxrandr2 \
            libxcomposite1 libxfixes3 > /dev/null
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push

      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            > apps/api/.env

      - name: Build packages
        run: TURBO_CONCURRENCY=1 pnpm build

      - name: Start servers and run E2E tests
        run: |
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "ERROR: API server failed to start"
              exit 1
            fi
          done
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web server is ready"
              break
            fi
            echo "Waiting for Web... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Web server failed to start"
              exit 1
            fi
          done
          npx playwright test --reporter=list

  e2e-mobile-android:
    if: ${{ secrets.GCLOUD_SERVICE_KEY != '' && secrets.EXPO_TOKEN != '' }}
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Install gcloud CLI
        run: |
          apt-get update -qq && apt-get install -y -qq apt-transport-https ca-certificates gnupg curl > /dev/null
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
          apt-get update -qq && apt-get install -y -qq google-cloud-cli > /dev/null

      - name: Authenticate gcloud
        run: |
          echo '${{ secrets.GCLOUD_SERVICE_KEY }}' > /tmp/gcloud-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcloud-key.json
          gcloud config set project ${{ secrets.FIREBASE_PROJECT_ID }}
          rm /tmp/gcloud-key.json

      - name: Install EAS CLI and build APK
        run: |
          npm install -g eas-cli
          cd apps/mobile
          EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} eas build --platform android --profile detox-test --non-interactive --wait
          EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} eas build:list --platform android --status finished --limit 1 --json > build-info.json
          BUILD_URL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('build-info.json','utf8'))[0].artifacts.buildUrl)")
          curl -fsSL -o app-release.apk "$BUILD_URL"

      - name: Run Robo test on Firebase Test Lab
        run: |
          cd apps/mobile
          gcloud firebase test android run \
            --type robo \
            --app app-release.apk \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 300s \
            --client-details matrixLabel="Robo crawl"

  deploy-web:
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    needs: [lint, test, build, e2e-web]
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build with Vercel
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        run: |
          curl -s -X POST \
            "https://git.hiten-patel.co.uk/api/v1/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"Preview deployed: ${{ steps.deploy.outputs.DEPLOY_URL }}\"}"

  deploy-api:
    if: ${{ github.ref == 'refs/heads/main' && secrets.RAILWAY_TOKEN != '' }}
    needs: [lint, test, build, e2e-web]
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          cd packages/db
          pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Install Railway CLI and deploy
        run: |
          curl -fsSL https://railway.com/install.sh | sh
          cd apps/api
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
