name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install and start PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql postgresql-client
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolconnect_test -c "SELECT 1;"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test

  build:
    runs-on: docker
    container: node:24-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e-web:
    runs-on: docker
    container:
      image: node:24-bookworm
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolconnect_test
        BETTER_AUTH_SECRET: test-secret-for-ci-e2e-testing-only
        BETTER_AUTH_URL: http://localhost:4000
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NODE_ENV: test
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install and start PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql postgresql-client curl
          PG_VER=$(pg_lsclusters -h | head -1 | awk '{print $1}')
          pg_ctlcluster "$PG_VER" main start
          su - postgres -c "psql -c \"ALTER USER postgres PASSWORD 'postgres';\""
          su - postgres -c "createdb schoolconnect_test"
          PGPASSWORD=postgres psql -h localhost -U postgres -d schoolconnect_test -c "SELECT 1;"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Push database schema
        run: pnpm --filter @schoolconnect/db db:push

      - name: Create API .env
        run: |
          printf '%s\n' \
            'DATABASE_URL=postgresql://postgres:postgres@localhost:5432/schoolconnect_test' \
            'BETTER_AUTH_SECRET=test-secret-for-ci-e2e-testing-only' \
            'BETTER_AUTH_URL=http://localhost:4000' \
            'NODE_ENV=test' \
            > apps/api/.env

      - name: Build packages
        run: pnpm build

      - name: Generate Playwright tests
        run: pnpm --filter @schoolconnect/e2e generate:playwright --tags=smoke

      - name: Start servers and run tests
        run: |
          pnpm --filter @schoolconnect/api dev &
          pnpm --filter @schoolconnect/web dev &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4000/trpc/health.check > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "ERROR: API server failed to start"
              exit 1
            fi
          done
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web server is ready"
              break
            fi
            echo "Waiting for Web... ($i/60)"
            sleep 2
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Web server failed to start"
              exit 1
            fi
          done
          pnpm --filter @schoolconnect/e2e test:web
