journey:
  id: outstanding-payments-checkout
  name: Outstanding Payments Shows Add to Cart
  tags: [parent, authenticated, payments, regression]
  role: parent
  preconditions:
    seed: parent-with-payments
    state: authenticated
  steps:
    - action: navigate
      target: payments
      selectors:
        web: "/dashboard/payments"
        mobile: "Payments"
    - action: wait
      target: payments-list
      selectors:
        web: "[data-testid='payments-list']"
        mobile: "Payments"
  assertions:
    - type: visible
      text: "Add to Cart"
    - type: visible
      text: "Pay Now"
