journey:
  id: view-payments
  name: View Payments
  tags: [smoke, parent, authenticated, payments]
  role: parent
  preconditions:
    seed: parent-with-payments
    state: authenticated
  steps:
    - action: navigate
      target: payments
      selectors:
        web: "/dashboard/payments"
        mobile: "Payments"
    - action: wait
      target: payments-list
      selectors:
        web: "[data-testid='payments-list']"
        mobile: "Payments"
  assertions:
    - type: visible
      text: "Payment Item 1"
