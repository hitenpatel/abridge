journey:
  id: compose-message-web
  name: Compose Message on Web
  tags: [staff, authenticated, messaging, regression]
  role: staff
  skipPlatforms: [mobile]
  preconditions:
    seed: staff-with-school
    state: authenticated
  steps:
    - action: navigate
      target: compose-message
      selectors:
        web: "/dashboard/messages/new"
        mobile: "N/A"
    - action: fill
      target: subject
      selectors:
        web: "[data-testid='message-subject-input']"
        mobile: "N/A"
      value: "School Trip Reminder"
    - action: fill
      target: body
      selectors:
        web: "[data-testid='message-body-input']"
        mobile: "N/A"
      value: "Please remember to bring packed lunch for the trip tomorrow."
    - action: tap
      target: send-button
      selectors:
        web: "[data-testid='message-send-button']"
        mobile: "N/A"
  assertions:
    - type: visible
      text: "Message sent"
