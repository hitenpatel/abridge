journey:
  id: change-password
  name: Change Password Form Renders
  tags: [parent, authenticated, settings, regression]
  role: parent
  preconditions:
    seed: parent-with-school
    state: authenticated
  steps:
    - action: navigate
      target: settings
      selectors:
        web: "/dashboard/settings"
        mobile: "Settings"
    - action: wait
      target: settings-page
      selectors:
        web: "[data-testid='settings-page']"
        mobile: "Settings"
  assertions:
    - type: visible
      text: "Change Password"
    - type: visible
      text: "Current Password"
    - type: visible
      text: "New Password"
