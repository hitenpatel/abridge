journey:
  id: staff-update-profile
  name: Staff Update Profile
  tags: [staff, authenticated, settings, regression]
  role: staff
  preconditions:
    seed: staff-with-school
    state: authenticated
  steps:
    - action: navigate
      target: settings
      selectors:
        web: "/dashboard/settings"
        mobile: "Settings"
    - action: wait
      target: settings-view
      selectors:
        web: "[data-testid='settings-view']"
        mobile: "Profile"
    - action: fill
      target: name-input
      selectors:
        web: "[data-testid='profile-name-input']"
        mobile: "Name"
      value: "Updated Staff Name"
    - action: tap
      target: save
      selectors:
        web: "[data-testid='profile-save-button']"
        mobile: "Save Profile"
  assertions:
    - type: visible
      text: "Updated Staff Name"
