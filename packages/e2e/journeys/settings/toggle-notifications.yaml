journey:
  id: toggle-notifications
  name: Toggle Notification Channels
  tags: [parent, authenticated, settings, regression]
  role: parent
  preconditions:
    seed: parent-with-school
    state: authenticated
  steps:
    - action: navigate
      target: settings
      selectors:
        web: "/dashboard/settings"
        mobile: "Settings"
    - action: tap
      target: sms-toggle
      selectors:
        web: "[data-testid='toggle-sms']"
        mobile: "SMS"
    - action: tap
      target: save
      selectors:
        web: "[data-testid='notifications-save-button']"
        mobile: "Save Notifications"
  assertions:
    - type: visible
      text: "saved"
      mobileText: "Saved"
