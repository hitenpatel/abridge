journey:
  id: set-quiet-hours
  name: Set Quiet Hours
  tags: [parent, authenticated, settings, regression]
  role: parent
  preconditions:
    seed: parent-with-school
    state: authenticated
  steps:
    - action: navigate
      target: settings
      selectors:
        web: "/dashboard/settings"
        mobile: "Settings"
    - action: fill
      target: quiet-start
      selectors:
        web: "[data-testid='quiet-start-input']"
        mobile: "Quiet Start"
      value: "22:00"
    - action: fill
      target: quiet-end
      selectors:
        web: "[data-testid='quiet-end-input']"
        mobile: "Quiet End"
      value: "07:00"
    - action: tap
      target: save
      selectors:
        web: "[data-testid='notifications-save-button']"
        mobile: "Save Notifications"
  assertions:
    - type: visible
      text: "saved"
