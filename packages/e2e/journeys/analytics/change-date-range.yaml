journey:
  id: change-date-range
  name: Change Analytics Date Range
  tags: [admin, authenticated, analytics, regression]
  role: staff
  skipPlatforms: [mobile]
  preconditions:
    seed: admin-with-analytics-data
    state: authenticated
  steps:
    - action: navigate
      target: analytics
      selectors:
        web: "/dashboard/analytics"
        mobile: "N/A"
    - action: wait
      target: analytics-view
      selectors:
        web: "[data-testid='analytics-view']"
        mobile: "N/A"
    - action: tap
      target: term-range
      selectors:
        web: "[data-testid='date-range-term']"
        mobile: "N/A"
  assertions:
    - type: visible
      text: "Term"
