journey:
  id: create-event
  name: Create Calendar Event
  tags: [admin, authenticated, calendar, regression]
  role: staff
  skipPlatforms: [mobile]
  preconditions:
    seed: staff-with-school
    state: authenticated
  steps:
    - action: navigate
      target: calendar
      selectors:
        web: "/dashboard/calendar"
        mobile: "N/A"
    - action: tap
      target: create-event
      selectors:
        web: "[data-testid='create-event-button']"
        mobile: "N/A"
    - action: fill
      target: title
      selectors:
        web: "[data-testid='event-title-input']"
        mobile: "N/A"
      value: "Sports Day"
    - action: tap
      target: submit
      selectors:
        web: "[data-testid='event-create-submit']"
        mobile: "N/A"
  assertions:
    - type: visible
      text: "Sports Day"
