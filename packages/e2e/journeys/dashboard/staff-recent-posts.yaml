journey:
  id: staff-recent-posts
  name: Staff View Recent Posts on Dashboard
  tags: [staff, authenticated, dashboard, regression]
  role: staff
  preconditions:
    seed: staff-with-posts
    state: authenticated
  steps:
    - action: navigate
      target: dashboard
      selectors:
        web: "/dashboard"
        mobile: "Home"
    - action: wait
      target: dashboard-view
      selectors:
        web: "[data-testid='dashboard-view']"
        mobile: "Home"
  assertions:
    - type: visible
      text: "Staff post 1"
