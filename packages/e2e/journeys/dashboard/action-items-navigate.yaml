journey:
  id: action-items-navigate
  name: Tap Action Item Navigates to Section
  tags: [parent, authenticated, dashboard, regression]
  role: parent
  preconditions:
    seed: parent-with-action-items
    state: authenticated
  steps:
    - action: navigate
      target: dashboard
      selectors:
        web: "/dashboard"
        mobile: "Home"
    - action: wait
      target: action-items
      selectors:
        web: "[data-testid='action-items-row']"
        mobile: "Action Items"
    - action: tap
      target: payment-action
      selectors:
        web: "[data-testid='action-item-payments']"
        mobile: "Payments Due"
  assertions:
    - type: visible
      text: "Payments"
