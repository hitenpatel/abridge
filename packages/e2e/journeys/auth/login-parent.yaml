journey:
  id: login-parent
  name: Parent Login
  tags: [smoke, parent, unauthenticated, auth]
  role: parent
  preconditions:
    seed: parent-with-school
    state: unauthenticated
  steps:
    - action: navigate
      target: login
      selectors:
        web: "/"
        mobile: "/"
    - action: fill
      target: email-input
      selectors:
        web: "[data-testid='email-input']"
        mobile: "Email"
      value: parent@test.com
    - action: fill
      target: password-input
      selectors:
        web: "[data-testid='password-input']"
        mobile: "Password"
      value: testpass123
    - action: tap
      target: login-button
      selectors:
        web: "[data-testid='login-button']"
        mobile: "Sign In"
  assertions:
    - type: visible
      text: "Messages"
