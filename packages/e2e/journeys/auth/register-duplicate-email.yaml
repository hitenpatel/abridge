journey:
  id: register-duplicate-email
  name: Register with Already Used Email
  tags: [auth, unauthenticated, error]
  role: parent
  skipPlatforms: [mobile]
  preconditions:
    seed: parent-with-school
    state: unauthenticated
  steps:
    - action: navigate
      target: register
      selectors:
        web: "/register"
        mobile: "N/A"
    - action: fill
      target: name-input
      selectors:
        web: "[data-testid='register-name-input']"
        mobile: "N/A"
      value: "Duplicate User"
    - action: fill
      target: email-input
      selectors:
        web: "[data-testid='register-email-input']"
        mobile: "N/A"
      value: "parent@test.com"
    - action: fill
      target: password-input
      selectors:
        web: "[data-testid='register-password-input']"
        mobile: "N/A"
      value: "testpass123"
    - action: tap
      target: register-button
      selectors:
        web: "[data-testid='register-button']"
        mobile: "N/A"
  assertions:
    - type: visible
      text: "already"
