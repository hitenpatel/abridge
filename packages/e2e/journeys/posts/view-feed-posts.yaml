journey:
  id: view-feed-posts
  name: View Class Posts in Feed
  tags: [smoke, parent, authenticated, posts]
  role: parent
  preconditions:
    seed: parent-with-posts
    state: authenticated
  steps:
    - action: navigate
      target: dashboard
      selectors:
        web: "/dashboard"
        mobile: "Home"
    - action: wait
      target: feed-loaded
      selectors:
        web: "[data-testid='activity-feed']"
        mobile: "Feed"
  assertions:
    - type: visible
      text: "Class update 1"
