journey:
  id: view-staff-attendance
  name: Staff View Attendance
  tags: [staff, authenticated, attendance]
  role: staff
  preconditions:
    seed: staff-with-school
    state: authenticated
  steps:
    - action: navigate
      target: attendance
      selectors:
        web: "/dashboard/attendance"
        mobile: "Attendance"
    - action: wait
      target: attendance-view
      selectors:
        web: "[data-testid='attendance-view']"
        mobile: "Attendance"
  assertions:
    - type: visible
      text: "Attendance"
