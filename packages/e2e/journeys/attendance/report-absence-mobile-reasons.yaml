journey:
  id: report-absence-mobile-reasons
  name: Report Absence with Reason Categories
  tags: [parent, authenticated, attendance, regression]
  role: parent
  skipPlatforms: [web]
  preconditions:
    seed: parent-with-school
    state: authenticated
  steps:
    - action: navigate
      target: attendance
      selectors:
        web: null
        mobile: "Attendance"
    - action: tap
      target: report-absence
      selectors:
        web: null
        mobile: "Report Absence"
    - action: tap
      target: sick-reason
      selectors:
        web: null
        mobile: "Sick"
    - action: tap
      target: submit
      selectors:
        web: null
        mobile: "Submit"
  assertions:
    - type: visible
      text: "Absence reported"
